<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do App</title>
</head>
<body>
    <h2>To Do List</h2>
    <h3>Enter "list" to list tasks</h3>
    <h3>Enter "add" to add a new task</h3>
    <h3>Enter "del" to remove a task</h3>

</body>
</html>
